<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swipe Cut Ultra Studio</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0a0a0a; --surface: #1a1a1a; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- Splash Screen --- */
        #splash {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            animation: fadeOut 0.6s forwards 1.5s;
        }
        .splash-logo { 
            font-size: 30px; font-weight: 900; color: var(--primary); 
            text-shadow: 0 0 15px var(--primary); 
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.1); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- Header --- */
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid #333; z-index: 100; }
        .logo { font-weight: 900; font-size: 22px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .head-btns { display: flex; gap: 10px; }
        .btn-icon { background: #222; border: 1px solid #444; color: white; padding: 5px 12px; border-radius: 5px; font-size: 14px; }
        .save-btn { background: var(--primary); color: #000; border: none; padding: 6px 18px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* --- Workspace --- */
        #main-editor { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px; overflow: hidden; }
        canvas { max-width: 95%; max-height: 90%; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid #444; }
        #crop-rect { position: absolute; border: 2px solid var(--primary); box-shadow: 0 0 0 4000px rgba(0,0,0,0.6); display: none; pointer-events: none; }

        /* --- Panels --- */
        .panel { display: none; background: var(--surface); padding: 20px; border-radius: 20px 20px 0 0; position: fixed; bottom: 80px; width: 100%; border-top: 1px solid #444; z-index: 80; }
        .active-panel { display: block; animation: slideUp 0.3s cubic-bezier(0, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* --- UI Elements --- */
        .scroller { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; scrollbar-width: none; }
        .filter-card { min-width: 80px; text-align: center; cursor: pointer; }
        .fx-thumb { width: 60px; height: 60px; background: #333; border-radius: 10px; margin-bottom: 5px; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .filter-card:active .fx-thumb { border-color: var(--primary); }
        
        input[type=range] { width: 100%; accent-color: var(--primary); margin: 15px 0; height: 6px; }
        input[type=text] { width: 100%; padding: 15px; background: #111; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 10px; }
        .label-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--primary); margin-bottom: 5px; }

        /* --- Navigation --- */
        nav { background: #000; height: 80px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; color: #666; width: 20%; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">SWIPE CUT</div>
    </div>

    <header>
        <div class="logo">SWIPE CUT <span style="font-size: 10px; color: #666;">ULTRA</span></div>
        <div class="head-btns">
            <button class="btn-icon" onclick="undo()">↩️</button>
            <button class="save-btn" onclick="exportPhoto()">EXPORT</button>
        </div>
    </header>

    <div id="main-editor">
        <canvas id="canvas"></canvas>
        <div id="crop-rect"></div>
        <div id="start-msg" onclick="document.getElementById('file-in').click()" style="text-align: center; cursor: pointer;">
            <div style="font-size: 60px;">📸</div>
            <p style="color: #666;">Open Photo to start Magic</p>
        </div>
        <input type="file" id="file-in" accept="image/*" hidden>
    </div>

    <div id="adj-panel" class="panel active-panel">
        <div class="label-row"><span id="adj-name">Brightness</span><span id="adj-val">100%</span></div>
        <input type="range" id="master-slider" min="0" max="200" value="100">
        <div class="scroller">
            <div class="filter-card" onclick="setAdj('brightness')"><div class="fx-thumb">☀️</div><span>Bright</span></div>
            <div class="filter-card" onclick="setAdj('contrast')"><div class="fx-thumb">🌗</div><span>Contrast</span></div>
            <div class="filter-card" onclick="setAdj('saturate')"><div class="fx-thumb">🌈</div><span>Color</span></div>
            <div class="filter-card" onclick="setAdj('hue-rotate')"><div class="fx-thumb">🌡️</div><span>Warmth</span></div>
        </div>
    </div>

    <div id="fx-panel" class="panel">
        <div class="scroller">
            <div class="filter-card" onclick="applyFx('none')"><div class="fx-thumb">🚫</div><span>None</span></div>
            <div class="filter-card" onclick="applyFx('grayscale(100%)')"><div class="fx-thumb">📽️</div><span>Classic</span></div>
            <div class="filter-card" onclick="applyFx('sepia(100%)')"><div class="fx-thumb">📜</div><span>Vintage</span></div>
            <div class="filter-card" onclick="applyFx('invert(100%)')"><div class="fx-thumb">🎞️</div><span>Negative</span></div>
        </div>
    </div>

    <div id="text-panel" class="panel">
        <input type="text" id="text-input" placeholder="Yahan likhein...">
        <button class="save-btn" style="width:100%;" onclick="renderText()">ADD TEXT</button>
    </div>

    <div id="crop-panel" class="panel">
        <button class="save-btn" style="width:100%;" onclick="doCrop()">CROP NOW</button>
    </div>

    <nav>
        <div class="nav-item active" onclick="tab('adj-panel', this)">🛠️<span>Tools</span></div>
        <div class="nav-item" onclick="tab('fx-panel', this)">🎨<span>Filters</span></div>
        <div class="nav-item" onclick="tab('text-panel', this)">🅰️<span>Text</span></div>
        <div class="nav-item" onclick="tab('crop-panel', this)">✂️<span>Crop</span></div>
        <div class="nav-item" onclick="resetAll()">🔄<span>Reset</span></div>
    </nav>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const fileIn = document.getElementById('file-in'), slider = document.getElementById('master-slider');
        const cropRect = document.getElementById('crop-rect');
        
        let baseImg = new Image(), currentFx = '';
        let adj = { brightness: 100, contrast: 100, saturate: 100, 'hue-rotate': 0, blur: 0 };
        let mode = 'brightness', undoStack = [];
        let isCr = false, startX, startY;

        fileIn.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                baseImg.onload = () => {
                    document.getElementById('start-msg').style.display='none';
                    canvas.width = baseImg.width; canvas.height = baseImg.height;
                    applyAll();
                }
                baseImg.src = f.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function tab(id, el) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active-panel');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            isCr = (id === 'crop-panel');
        }

        function setAdj(m) {
            mode = m; slider.value = adj[m];
            document.getElementById('adj-name').innerText = m.toUpperCase();
            document.getElementById('adj-val').innerText = slider.value + '%';
        }

        slider.oninput = () => {
            adj[mode] = slider.value;
            document.getElementById('adj-val').innerText = slider.value + '%';
            applyAll();
        }

        function applyFx(f) { currentFx = (f === 'none' ? '' : f); applyAll(); }

        function applyAll() {
            ctx.filter = `brightness(${adj.brightness}%) contrast(${adj.contrast}%) saturate(${adj.saturate}%) hue-rotate(${adj['hue-rotate']}deg) ${currentFx}`;
            ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);
        }

        function renderText() {
            saveState();
            ctx.font = "bold 100px sans-serif";
            ctx.fillStyle = "#00d2ff";
            ctx.fillText(document.getElementById('text-input').value, 100, 200);
            baseImg.src = canvas.toDataURL();
        }

        function exportPhoto() {
            if (!baseImg.src) { alert("Photo select karein!"); return; }
            const link = document.createElement('a');
            link.download = `SwipeCut_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function saveState() { undoStack.push(canvas.toDataURL()); }
        function undo() { if(undoStack.length > 0) baseImg.src = undoStack.pop(); }
        function resetAll() { location.reload(); }
    </script>
</body>
</html>
